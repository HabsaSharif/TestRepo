<!DOCTYPE html>
<html>

<head>
    <title>JS basics</title>
</head>

<body>
    <h3>If-else-else-if....Elsa? Let it go?</h3>
    <script>
        var year = 3;
        if (year == 1) {
            document.write("You are in year 1 noob");
        }
        else if (year == 2) {
            document.write("You are in year 2 nerd");
        }
        else {
            document.write("You are in year 3 unc");
        }
    </script>
    <h3>For....what do i do this for?</h3>
    <script>
        for (var i = 1; i <= 20; i++) {
           document.write(i + '<br>'); 
        }

        var names = ["Michael Scott", "Mike", "M-dog", "Mizza"];
        for (var name of names) {
        document.write("You are so beautiful " + name + "<br>");
}
    </script>
    <h3>While...I have a poodle and a doodle</h3>
    <script>
        i = 0;
        while (i < 20) {
            i = i + 1;
            document.write( i + '<br>'); 
        }
    </script>
    
    
</body>

</html>
