<!DOCTYPE html>
<html>
  <head>
    <title>Buttons!</title>
    <script>
	    function msg() {
      document.write("You clicked the button!")
    };
    	function msg2() {
      document.write("Are you an idiot or what...I said button!")
    };
    function change() {
     document.getElementById("my_text").innerHTML = "You <i>clicked</i> me";
    }
      
    </script>

  </head>
  <body>
    <h1>
      Click the button!
    </h1>
    <input type="button" value="Click Me!" onclick="change()">
    <input type="checkbox" value="Check here!" onclick="msg2()">
    <p id="my_text">
      Hello, world!
    </p>
  </body>
</html>
